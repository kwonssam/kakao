<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Map Search</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; }

        /* 화면 분할 레이아웃 */
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 (검색창 + 리스트) */
        #menu_wrap {
            width: 350px;
            height: 100%;
            background: #fff;
            z-index: 10;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }

        .search_box { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .search_box input { width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search_box button { width: 25%; padding: 8px; background: #fae100; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        #placesList { list-style: none; padding: 10px; }
        #placesList li { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        #placesList li:hover { background: #f1f3f5; }
        #placesList .info h5 { color: #333; font-size: 16px; margin-bottom: 5px; }
        #placesList .info .address { font-size: 13px; color: #666; }

        /* 오른쪽 지도 영역 */
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu_wrap">
        <div class="search_box">
            <form onsubmit="searchPlaces(); return false;">
                <input type="text" value="강남역 맛집" id="keyword" placeholder="장소를 입력하세요">
                <button type="submit">검색</button>
            </form>
        </div>
        <ul id="placesList"></ul>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8e63724a5ae060891596d0d2cc915fc3&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let ps; // 장소 검색 객체
    let markers = []; // 마커를 담을 배열

    // 1. 페이지 로드 시 실행: 지도 초기화 및 현재 위치 가져오기
    initMap();

    function initMap() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 좌표 (서울시청)
            level: 5 // 확대 레벨 5
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        ps = new kakao.maps.services.Places(); // 장소 검색 객체 생성

        // HTML5의 geolocation으로 사용할 수 있는지 확인합니다
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; // 위도
                const lon = position.coords.longitude; // 경도
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                map.setCenter(locPosition); // 현재 위치로 지도 중심 이동
                displayMarker(locPosition, "내 위치"); // 현재 위치에 마커 표시
            });
        }
    }

    // 2. 키워드 검색 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return false;
        }

        // 카카오 장소 검색 서비스 이용
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 3. 검색 완료 시 호출되는 콜백함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data); // 검색 결과 리스트 표시
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 4. 검색 결과 목록과 마커 표시 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();
        
        removeMarker(); // 이전 마커 제거
        listEl.innerHTML = ''; // 이전 결과 리스트 초기화

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(placePosition, i);
            const itemEl = getListItem(i, places[i]);

            bounds.extend(placePosition);

            // 마커와 검색 결과 항목에 마우스 오버 시 이벤트 추가
            (function(marker, title) {
                itemEl.onclick = function() {
                    map.setCenter(marker.getPosition());
                };
            })(marker, places[i].place_name);

            listEl.appendChild(itemEl);
        }

        map.setBounds(bounds); // 검색된 장소들이 모두 보이도록 지도 범위 조정
    }

    // 마커 생성 함수
    function addMarker(position, idx) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 모든 마커 제거 함수
    function removeMarker() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }

    // 리스트 아이템 HTML 생성 함수
    function getListItem(index, places) {
        const el = document.createElement('li');
        let itemStr = `<div class="info"><h5>${places.place_name}</h5>`;
        
        if (places.road_address_name) {
            itemStr += `<span class="address">${places.road_address_name}</span>`;
        } else {
            itemStr += `<span class="address">${places.address_name}</span>`;
        }
        itemStr += `</div>`;
        
        el.innerHTML = itemStr;
        return el;
    }

    // 단순 위치 표시용 마커 함수
    function displayMarker(locPosition, message) {
        const marker = new kakao.maps.Marker({
            map: map,
            position: locPosition
        });
    }
</script>

</body>
</html>

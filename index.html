<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 카카오맵 검색 서비스</title>
    <style>
        /* 기본 여백 초기화 및 화면 전체 크기 사용 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* [조건 1] 화면을 왼쪽과 오른쪽으로 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽: 검색창 + 결과 리스트 영역 */
        .sidebar {
            width: 350px; /* 왼쪽 영역 너비 */
            height: 100%;
            background-color: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 검색창 스타일 */
        .search-box {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-box input {
            width: 70%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-box button {
            width: 25%;
            padding: 10px;
            background-color: #fee500; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .result-item {
            padding: 15px;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #e2e2e2;
        }

        /* [조건 1] 오른쪽: 지도 영역 */
        .map-area {
            flex: 1; /* 남은 화면을 모두 차지 */
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" value="강남역맛집">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <div id="placesList" class="result-list">
                </div>
        </div>

        <div id="map" class="map-area"></div>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e79e8a19bc75f9af02ad1b4d3bdc29e3&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언
        let map;
        let ps; // 장소 검색 객체
        let infowindow; // 마커 클릭 시 띄울 말풍선

        // [조건 3] 지도가 완전히 로드된 후 실행되도록 kakao.maps.load 사용
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            
            // 기본 중심 좌표 (위치 권한 거부 시 사용할 서울역 좌표)
            const defaultOption = {
                center: new kakao.maps.LatLng(37.554648, 126.972559), 
                level: 5 // [조건 4] 지도 확대 레벨 5
            };

            // 지도 객체 생성
            map = new kakao.maps.Map(mapContainer, defaultOption);
            
            // 장소 검색 객체와 인포윈도우 초기화
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            // [조건 2] HTML5의 geolocation으로 현재 위치 가져오기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const locPosition = new kakao.maps.LatLng(lat, lon); // 현재 위치 좌표 생성
                    
                    map.setCenter(locPosition); // 지도의 중심을 현재 위치로 변경
                    
                    // 현재 위치에 마커 표시
                    displayMarker(locPosition, '📍 현재 나의 위치');
                }, function(error) {
                    console.log("위치 권한을 획득하지 못했습니다.", error);
                });
            }
        });

        // 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 카카오맵 키워드 검색 서비스 실행
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 장소검색이 완료됐을 때 호출되는 콜백함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 지도와 리스트에 표시
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과 목록과 마커를 표출하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('placesList');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 기존 검색 결과 지우기
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                // 마커를 생성하고 지도에 표시합니다
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = displayMarker(placePosition, places[i].place_name);

                // 검색된 장소 위치를 기준으로 지도 범위를 재설정하기위해 LatLngBounds 객체에 좌표를 추가합니다
                bounds.extend(placePosition);

                // 왼쪽 리스트에 아이템 추가
                const itemEl = document.createElement('div');
                itemEl.className = 'result-item';
                itemEl.innerHTML = `<h5>${places[i].place_name}</h5><span>${places[i].road_address_name || places[i].address_name}</span>`;
                
                // 리스트 아이템 클릭 시 지도 중심 이동 및 인포윈도우 표시
                itemEl.onclick = function() {
                    map.setCenter(placePosition);
                    infowindow.setContent('<div style="padding:5px;font-size:12px;">' + places[i].place_name + '</div>');
                    infowindow.open(map, marker);
                };

                listEl.appendChild(itemEl);
            }

            // 검색된 장소들이 다 보이도록 지도 화면 범위 변경
            map.setBounds(bounds);
        }

        // 지도에 마커를 생성하고 표시하는 함수
        function displayMarker(position, message) {
            const marker = new kakao.maps.Marker({
                map: map,
                position: position
            });

            // 마커를 클릭하면 장소명이 인포윈도우에 표출됩니다
            kakao.maps.event.addListener(marker, 'click', function() {
                infowindow.setContent('<div style="padding:5px;font-size:12px;">' + message + '</div>');
                infowindow.open(map, marker);
            });

            return marker;
        }
    </script>
</body>
</html>
